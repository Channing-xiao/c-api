# 上游 New-API 服务（仅本地回环可访问）
upstream new_api_backend {
    server 127.0.0.1:3000;
    keepalive 32;  # 长连接复用
}

# WebSocket 连接升级映射
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP 80 端口：强制跳转 HTTPS + Certbot 验证
server {
    listen 80;
    listen [::]:80;
    server_name ai-api.cncarecc.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 443 端口：反向代理到 New-API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai-api.cncarecc.com;

    # SSL 证书（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/ai-api.cncarecc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-api.cncarecc.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 客户端请求体大小限制
    client_max_body_size 50m;

    # 通用代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # ============================================
    # 渠道模型测试接口：响应时间可能很长（如推理模型）
    # ============================================
    location /api/channel/test/ {
        proxy_pass http://new_api_backend;
        proxy_http_version 1.1;

        # 关闭缓冲，避免响应被缓存
        proxy_buffering off;
        proxy_cache off;

        # 超长超时：读响应头/体最多 10 分钟
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;

        # WebSocket 支持（按需）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ============================================
    # Playground / 聊天补全：流式输出 + 长连接
    # ============================================
    location /pg/chat/completions {
        proxy_pass http://new_api_backend;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ============================================
    # API 流式补全：SSE / streaming
    # ============================================
    location ~* ^/v\d+/chat/completions$ {
        proxy_pass http://new_api_backend;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ============================================
    # 其他所有请求：默认较短超时
    # ============================================
    location / {
        proxy_pass http://new_api_backend;
        proxy_http_version 1.1;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
